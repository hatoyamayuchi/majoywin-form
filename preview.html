<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Preview</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <h1>任务预览页</h1>
  <div id="content">加载中...</div>

  <script>
    const SUPABASE_URL = "你的 Supabase Project URL";
    const SUPABASE_ANON_KEY = "你的 anon public key";
    const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");

    async function loadTask() {
      const { data, error } = await client
        .from("a2_tasks")
        .select("*")
        .eq("id", id)
        .single();

      if (error) {
        document.getElementById("content").innerText = "读取失败: " + error.message;
        return;
      }

      document.getElementById("content").innerHTML = `
        <h2>${data.task_name || ""}</h2>
        <p><strong>市场:</strong> ${data.market || ""}</p>
        <p><strong>Offer:</strong> ${data.offer_name || ""}</p>
        <p><strong>角度:</strong> ${data.angle || ""}</p>
        <p><strong>文案:</strong><br>${(data.copy_input || "").replace(/\n/g, "<br>")}</p>
        <p><strong>素材输入:</strong><br>${(data.asset_input || "").replace(/\n/g, "<br>")}</p>
        <p><strong>状态:</strong> ${data.status || ""}</p>
      `;
    }

    loadTask();
  </script>
</body>
</html>
