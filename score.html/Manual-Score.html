<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manual Score</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <h1>A2 人工打分</h1>

  <form id="scoreForm">
    <div>
      <label>分数（1-10）</label><br />
      <input type="number" id="manual_score" min="1" max="10" required />
    </div>
    <br />

    <div>
      <label>反馈</label><br />
      <textarea id="manual_feedback"></textarea>
    </div>
    <br />

    <div>
      <label>打分人</label><br />
      <input type="text" id="scored_by" />
    </div>
    <br />

    <button type="submit">提交评分</button>
  </form>

  <p id="result"></p>

  <script>
    const SUPABASE_URL = "你的 Supabase Project URL";
    const SUPABASE_ANON_KEY = "你的 anon public key";
    const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const params = new URLSearchParams(window.location.search);
    const taskId = params.get("id");

    document.getElementById("scoreForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const payload = {
        task_id: taskId,
        batch_id: "batch-001",
        manual_score: document.getElementById("manual_score").value,
        manual_feedback: document.getElementById("manual_feedback").value,
        scored_by: document.getElementById("scored_by").value,
        hermes_sync_status: "pending"
      };

      const { error } = await client
        .from("a2_manual_scores")
        .insert([payload]);

      if (error) {
        document.getElementById("result").innerText = "提交失败: " + error.message;
        return;
      }

      document.getElementById("result").innerText = "评分提交成功";
    });
  </script>
</body>
</html>
